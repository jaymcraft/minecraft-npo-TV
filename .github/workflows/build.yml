name: Build Mod Jar

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew build -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-tv-jar
          path: app/build/libs/*.jar
          if-no-files-found: error
